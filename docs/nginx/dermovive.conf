# Dermovive nginx site — pre-TLS form.
# certbot (--nginx) adds the `listen 443 ssl` server block and the http->https
# redirect on first run. See docs/DEPLOYMENT.md §5.7.
#
# Path routing: Laravel (php-fpm) owns a fixed set of prefixes; Next.js gets
# everything else. Both apps share the single origin dermovive-pharma.com.

server {
    listen 80;
    listen [::]:80;
    server_name dermovive-pharma.com www.dermovive-pharma.com;

    root /var/www/dermovive/backend/public;
    index index.php;
    client_max_body_size 50M;

    # ---- Laravel (php-fpm) owned paths ----
    location ^~ /api/v1   { try_files $uri /index.php?$query_string; }
    location ^~ /admin    { try_files $uri /index.php?$query_string; }
    location ^~ /livewire { try_files $uri /index.php?$query_string; }
    location ^~ /filament { try_files $uri /index.php?$query_string; }
    location ^~ /storage  { try_files $uri /index.php?$query_string; }

    # ---- Filament/Laravel published static assets ----
    location ^~ /css/ { try_files $uri =404; }
    location ^~ /js/  { try_files $uri =404; }

    # ---- PHP handler ----
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_hide_header X-Powered-By;
    }

    # ---- Everything else -> Next.js storefront ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location ~ /\.(?!well-known) { deny all; }
}
